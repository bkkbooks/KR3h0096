body:
  text: 梁元帝山水松石格一卷天地之名造化為靈設奇巧之體勢寫山水之縱橫或格高而思逸信筆妙而墨精由是設粉壁運神情素屏連隅山脈濺朴首尾相映項腹相近丈尺分寸約有常程樹石雲水俱無正形樹有大小叢貫孤平扶疏曲直聳拔凌亭乍起伏于柔條便同文字或難合於破墨體向異於丹青隱隱半壁高潛入冥插空類劍陷地如坑秋毛冬骨夏蔭春英炎緋寒碧暖日涼星巨松沁水噴之蔚回褒茂林之幽趣割雜草之芳情泉源至曲霧破山明精藍觀宇橋杓關城行人犬吠獸走鳥驚高墨猶緑下猶頳水因斷而流遠雲欲墜而霞輕桂不疏于胡越松不難于弟兄路廣石隔天遙鳥征雲中樹石宜先點石上枝柯末後成高嶺最嫌鄰刻石遠山大忌學圖經審問既然傳筆法祕之勿泄於戶庭
